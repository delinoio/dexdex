syntax = "proto3";

package dexdex;

import "google/protobuf/timestamp.proto";

// ============================================================================
// Common Enums
// ============================================================================

enum AiAgentType {
  AI_AGENT_TYPE_UNSPECIFIED = 0;
  AI_AGENT_TYPE_CLAUDE_CODE = 1;
  AI_AGENT_TYPE_OPEN_CODE = 2;
  AI_AGENT_TYPE_GEMINI_CLI = 3;
  AI_AGENT_TYPE_CODEX_CLI = 4;
  AI_AGENT_TYPE_AIDER = 5;
  AI_AGENT_TYPE_AMP = 6;
}

enum UnitTaskStatus {
  UNIT_TASK_STATUS_UNSPECIFIED = 0;
  UNIT_TASK_STATUS_QUEUED = 1;
  UNIT_TASK_STATUS_IN_PROGRESS = 2;
  UNIT_TASK_STATUS_ACTION_REQUIRED = 3;
  UNIT_TASK_STATUS_BLOCKED = 4;
  UNIT_TASK_STATUS_COMPLETED = 5;
  UNIT_TASK_STATUS_FAILED = 6;
  UNIT_TASK_STATUS_CANCELLED = 7;
}

enum SubTaskType {
  SUB_TASK_TYPE_UNSPECIFIED = 0;
  SUB_TASK_TYPE_INITIAL_IMPLEMENTATION = 1;
  SUB_TASK_TYPE_REQUEST_CHANGES = 2;
  SUB_TASK_TYPE_PR_CREATE = 3;
  SUB_TASK_TYPE_PR_REVIEW_FIX = 4;
  SUB_TASK_TYPE_PR_CI_FIX = 5;
  SUB_TASK_TYPE_MANUAL_RETRY = 6;
}

enum SubTaskStatus {
  SUB_TASK_STATUS_UNSPECIFIED = 0;
  SUB_TASK_STATUS_QUEUED = 1;
  SUB_TASK_STATUS_IN_PROGRESS = 2;
  SUB_TASK_STATUS_WAITING_FOR_PLAN_APPROVAL = 3;
  SUB_TASK_STATUS_WAITING_FOR_USER_INPUT = 4;
  SUB_TASK_STATUS_COMPLETED = 5;
  SUB_TASK_STATUS_FAILED = 6;
  SUB_TASK_STATUS_CANCELLED = 7;
}

enum AgentSessionStatus {
  AGENT_SESSION_STATUS_UNSPECIFIED = 0;
  AGENT_SESSION_STATUS_STARTING = 1;
  AGENT_SESSION_STATUS_RUNNING = 2;
  AGENT_SESSION_STATUS_WAITING_FOR_INPUT = 3;
  AGENT_SESSION_STATUS_COMPLETED = 4;
  AGENT_SESSION_STATUS_FAILED = 5;
  AGENT_SESSION_STATUS_CANCELLED = 6;
}

enum SessionOutputKind {
  SESSION_OUTPUT_KIND_UNSPECIFIED = 0;
  SESSION_OUTPUT_KIND_TEXT = 1;
  SESSION_OUTPUT_KIND_PLAN_UPDATE = 2;
  SESSION_OUTPUT_KIND_TOOL_CALL = 3;
  SESSION_OUTPUT_KIND_TOOL_RESULT = 4;
  SESSION_OUTPUT_KIND_PROGRESS = 5;
  SESSION_OUTPUT_KIND_WARNING = 6;
  SESSION_OUTPUT_KIND_ERROR = 7;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_REVIEW_REQUESTED = 1;
  ACTION_TYPE_PR_CREATION_READY = 2;
  ACTION_TYPE_PLAN_APPROVAL_REQUIRED = 3;
  ACTION_TYPE_CI_FAILED = 4;
  ACTION_TYPE_MERGE_CONFLICT = 5;
  ACTION_TYPE_SECURITY_ALERT = 6;
  ACTION_TYPE_USER_INPUT_REQUIRED = 7;
}

enum PrStatus {
  PR_STATUS_UNSPECIFIED = 0;
  PR_STATUS_OPEN = 1;
  PR_STATUS_APPROVED = 2;
  PR_STATUS_CHANGES_REQUESTED = 3;
  PR_STATUS_MERGED = 4;
  PR_STATUS_CLOSED = 5;
  PR_STATUS_CI_FAILED = 6;
}

enum BadgeColorKey {
  BADGE_COLOR_KEY_UNSPECIFIED = 0;
  BADGE_COLOR_KEY_BLUE = 1;
  BADGE_COLOR_KEY_GREEN = 2;
  BADGE_COLOR_KEY_YELLOW = 3;
  BADGE_COLOR_KEY_ORANGE = 4;
  BADGE_COLOR_KEY_RED = 5;
  BADGE_COLOR_KEY_GRAY = 6;
}

enum StreamEventType {
  STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  STREAM_EVENT_TYPE_TASK_UPDATED = 1;
  STREAM_EVENT_TYPE_SUBTASK_UPDATED = 2;
  STREAM_EVENT_TYPE_SESSION_OUTPUT = 3;
  STREAM_EVENT_TYPE_SESSION_STATE_CHANGED = 4;
  STREAM_EVENT_TYPE_PR_UPDATED = 5;
  STREAM_EVENT_TYPE_REVIEW_ASSIST_UPDATED = 6;
  STREAM_EVENT_TYPE_INLINE_COMMENT_UPDATED = 7;
  STREAM_EVENT_TYPE_NOTIFICATION_CREATED = 8;
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_TASK_ACTION_REQUIRED = 1;
  NOTIFICATION_TYPE_PLAN_ACTION_REQUIRED = 2;
  NOTIFICATION_TYPE_PR_REVIEW_ACTIVITY = 3;
  NOTIFICATION_TYPE_PR_CI_FAILURE = 4;
  NOTIFICATION_TYPE_AGENT_SESSION_FAILED = 5;
}

enum WorkerStatus {
  WORKER_STATUS_UNSPECIFIED = 0;
  WORKER_STATUS_IDLE = 1;
  WORKER_STATUS_BUSY = 2;
  WORKER_STATUS_UNHEALTHY = 3;
}

enum ReviewAssistItemStatus {
  REVIEW_ASSIST_ITEM_STATUS_UNSPECIFIED = 0;
  REVIEW_ASSIST_ITEM_STATUS_PENDING = 1;
  REVIEW_ASSIST_ITEM_STATUS_ACKNOWLEDGED = 2;
  REVIEW_ASSIST_ITEM_STATUS_DISMISSED = 3;
}

enum ReviewInlineCommentStatus {
  REVIEW_INLINE_COMMENT_STATUS_UNSPECIFIED = 0;
  REVIEW_INLINE_COMMENT_STATUS_OPEN = 1;
  REVIEW_INLINE_COMMENT_STATUS_RESOLVED = 2;
}

enum VcsProviderType {
  VCS_PROVIDER_TYPE_UNSPECIFIED = 0;
  VCS_PROVIDER_TYPE_GITHUB = 1;
  VCS_PROVIDER_TYPE_GITLAB = 2;
  VCS_PROVIDER_TYPE_BITBUCKET = 3;
}

// ============================================================================
// Core Messages
// ============================================================================

message GeneratedCommit {
  string sha = 1;
  repeated string parent_shas = 2;
  string title = 3;
  optional string body = 4;
  google.protobuf.Timestamp authored_at = 5;
}

message TokenUsageMetrics {
  string provider = 1;
  string model = 2;
  uint64 input_tokens = 3;
  uint64 output_tokens = 4;
  uint64 cache_read_tokens = 5;
  uint64 cache_write_tokens = 6;
  uint64 total_tokens = 7;
  double total_cost_usd = 8;
}

message UnitTask {
  string id = 1;
  string workspace_id = 2;
  string repository_group_id = 3;
  string title = 4;
  string prompt = 5;
  optional string branch_name = 6;
  UnitTaskStatus status = 7;
  repeated ActionType action_types = 8;
  repeated string pr_tracking_ids = 9;
  optional string latest_commit_sha = 10;
  uint32 generated_commit_count = 11;
  optional string latest_patch_ref = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message SubTask {
  string id = 1;
  string unit_task_id = 2;
  SubTaskType type = 3;
  string prompt = 4;
  SubTaskStatus status = 5;
  bool plan_mode_enabled = 6;
  optional ActionType target_action_type = 7;
  optional string base_commit_sha = 8;
  optional string head_commit_sha = 9;
  repeated GeneratedCommit generated_commits = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message AgentSession {
  string id = 1;
  string sub_task_id = 2;
  AiAgentType agent_type = 3;
  optional string model = 4;
  AgentSessionStatus status = 5;
  optional TokenUsageMetrics token_usage = 6;
  optional google.protobuf.Timestamp started_at = 7;
  optional google.protobuf.Timestamp completed_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

message SessionOutputEvent {
  string id = 1;
  string session_id = 2;
  uint64 sequence = 3;
  SessionOutputKind kind = 4;
  string message = 5;
  map<string, string> attributes = 6;
  google.protobuf.Timestamp emitted_at = 7;
}

message PullRequestTracking {
  string id = 1;
  string unit_task_id = 2;
  VcsProviderType provider = 3;
  string repository_id = 4;
  uint32 pr_number = 5;
  string pr_url = 6;
  PrStatus status = 7;
  optional google.protobuf.Timestamp last_polled_at = 8;
  bool auto_fix_enabled = 9;
  uint32 max_auto_fix_attempts = 10;
  uint32 auto_fix_attempts_used = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message ReviewAssistItem {
  string id = 1;
  string unit_task_id = 2;
  string pr_tracking_id = 3;
  string source_type = 4;
  string title = 5;
  optional string details = 6;
  ReviewAssistItemStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ReviewInlineComment {
  string id = 1;
  string unit_task_id = 2;
  optional string sub_task_id = 3;
  string file_path = 4;
  string side = 5;
  uint32 line_number = 6;
  string body = 7;
  ReviewInlineCommentStatus status = 8;
  optional string author_user_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message BadgeTheme {
  string id = 1;
  string workspace_id = 2;
  ActionType action_type = 3;
  BadgeColorKey color_key = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Notification {
  string id = 1;
  string workspace_id = 2;
  NotificationType type = 3;
  string title = 4;
  string body = 5;
  optional string deep_link = 6;
  optional google.protobuf.Timestamp read_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

message Workspace {
  string id = 1;
  string name = 2;
  optional string endpoint_url = 3;
  optional string auth_profile_id = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Repository {
  string id = 1;
  string workspace_id = 2;
  string remote_url = 3;
  string default_branch = 4;
  VcsProviderType vcs_provider = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message RepositoryGroup {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  repeated string repository_ids = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Worker {
  string id = 1;
  string name = 2;
  string endpoint_url = 3;
  WorkerStatus status = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  optional string current_sub_task_id = 6;
  google.protobuf.Timestamp registered_at = 7;
}

// ============================================================================
// Stream Events
// ============================================================================

message StreamEvent {
  StreamEventType type = 1;
  string workspace_id = 2;
  optional string payload_json = 3;
}

// ============================================================================
// WorkspaceService
// ============================================================================

message CreateWorkspaceRequest {
  string name = 1;
  optional string endpoint_url = 2;
}

message CreateWorkspaceResponse {
  Workspace workspace = 1;
}

message ListWorkspacesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
  int32 total_count = 2;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
}

message GetWorkspaceResponse {
  Workspace workspace = 1;
}

message UpdateWorkspaceRequest {
  string workspace_id = 1;
  optional string name = 2;
  optional string endpoint_url = 3;
}

message UpdateWorkspaceResponse {
  Workspace workspace = 1;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {}

service WorkspaceService {
  rpc Create(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc List(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc Get(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc Update(UpdateWorkspaceRequest) returns (UpdateWorkspaceResponse);
  rpc Delete(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
}

// ============================================================================
// RepositoryService
// ============================================================================

message AddRepositoryRequest {
  string workspace_id = 1;
  string remote_url = 2;
  optional string default_branch = 3;
}

message AddRepositoryResponse {
  Repository repository = 1;
}

message ListRepositoriesRequest {
  optional string workspace_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
  int32 total_count = 2;
}

message GetRepositoryRequest {
  string repository_id = 1;
}

message GetRepositoryResponse {
  Repository repository = 1;
}

message RemoveRepositoryRequest {
  string repository_id = 1;
}

message RemoveRepositoryResponse {}

message CreateRepositoryGroupRequest {
  string workspace_id = 1;
  string name = 2;
  repeated string repository_ids = 3;
}

message CreateRepositoryGroupResponse {
  RepositoryGroup group = 1;
}

message ListRepositoryGroupsRequest {
  optional string workspace_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListRepositoryGroupsResponse {
  repeated RepositoryGroup groups = 1;
  int32 total_count = 2;
}

message UpdateRepositoryGroupRequest {
  string group_id = 1;
  optional string name = 2;
  repeated string repository_ids = 3;
}

message UpdateRepositoryGroupResponse {
  RepositoryGroup group = 1;
}

message DeleteRepositoryGroupRequest {
  string group_id = 1;
}

message DeleteRepositoryGroupResponse {}

service RepositoryService {
  rpc Add(AddRepositoryRequest) returns (AddRepositoryResponse);
  rpc List(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc Get(GetRepositoryRequest) returns (GetRepositoryResponse);
  rpc Remove(RemoveRepositoryRequest) returns (RemoveRepositoryResponse);
  rpc CreateGroup(CreateRepositoryGroupRequest) returns (CreateRepositoryGroupResponse);
  rpc ListGroups(ListRepositoryGroupsRequest) returns (ListRepositoryGroupsResponse);
  rpc UpdateGroup(UpdateRepositoryGroupRequest) returns (UpdateRepositoryGroupResponse);
  rpc DeleteGroup(DeleteRepositoryGroupRequest) returns (DeleteRepositoryGroupResponse);
}

// ============================================================================
// TaskService
// ============================================================================

message CreateTaskRequest {
  string workspace_id = 1;
  string repository_group_id = 2;
  string title = 3;
  string prompt = 4;
  optional string branch_name = 5;
  optional AiAgentType agent_type = 6;
  optional string model = 7;
  bool plan_mode_enabled = 8;
}

message CreateTaskResponse {
  UnitTask task = 1;
}

message ListTasksRequest {
  optional string workspace_id = 1;
  optional string repository_group_id = 2;
  optional UnitTaskStatus status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListTasksResponse {
  repeated UnitTask tasks = 1;
  int32 total_count = 2;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  UnitTask task = 1;
}

message DeleteTaskRequest {
  string task_id = 1;
}

message DeleteTaskResponse {}

message ApproveSubTaskRequest {
  string sub_task_id = 1;
}

message ApproveSubTaskResponse {
  SubTask sub_task = 1;
}

message RequestChangesRequest {
  string task_id = 1;
  string feedback = 2;
}

message RequestChangesResponse {
  UnitTask task = 1;
}

message RejectSubTaskRequest {
  string sub_task_id = 1;
  optional string reason = 2;
}

message RejectSubTaskResponse {}

message ApprovePlanRequest {
  string sub_task_id = 1;
}

message ApprovePlanResponse {
  SubTask sub_task = 1;
}

message RevisePlanRequest {
  string sub_task_id = 1;
  string feedback = 2;
}

message RevisePlanResponse {
  SubTask sub_task = 1;
}

message RejectPlanRequest {
  string sub_task_id = 1;
  optional string reason = 2;
}

message RejectPlanResponse {}

message SubmitUserInputRequest {
  string session_id = 1;
  string input = 2;
}

message SubmitUserInputResponse {}

message CreatePrRequest {
  string task_id = 1;
}

message CreatePrResponse {
  UnitTask task = 1;
}

message CommitToLocalRequest {
  string task_id = 1;
}

message CommitToLocalResponse {}

message StopTaskRequest {
  string task_id = 1;
}

message StopTaskResponse {}

message RetrySubTaskRequest {
  string sub_task_id = 1;
}

message RetrySubTaskResponse {
  SubTask sub_task = 1;
}

service TaskService {
  rpc Create(CreateTaskRequest) returns (CreateTaskResponse);
  rpc List(ListTasksRequest) returns (ListTasksResponse);
  rpc Get(GetTaskRequest) returns (GetTaskResponse);
  rpc Delete(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ApproveSubTask(ApproveSubTaskRequest) returns (ApproveSubTaskResponse);
  rpc RequestChanges(RequestChangesRequest) returns (RequestChangesResponse);
  rpc RejectSubTask(RejectSubTaskRequest) returns (RejectSubTaskResponse);
  rpc ApprovePlan(ApprovePlanRequest) returns (ApprovePlanResponse);
  rpc RevisePlan(RevisePlanRequest) returns (RevisePlanResponse);
  rpc RejectPlan(RejectPlanRequest) returns (RejectPlanResponse);
  rpc SubmitUserInput(SubmitUserInputRequest) returns (SubmitUserInputResponse);
  rpc CreatePr(CreatePrRequest) returns (CreatePrResponse);
  rpc CommitToLocal(CommitToLocalRequest) returns (CommitToLocalResponse);
  rpc Stop(StopTaskRequest) returns (StopTaskResponse);
  rpc RetrySubTask(RetrySubTaskRequest) returns (RetrySubTaskResponse);
}

// ============================================================================
// SubTaskService
