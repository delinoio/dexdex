// ============================================================================
// EventStreamService
// ============================================================================

message SubscribeRequest {
  string workspace_id = 1;
}

service EventStreamService {
  rpc Subscribe(SubscribeRequest) returns (stream StreamEvent);
}

// ============================================================================
// WorkerService (Internal)
// ============================================================================

message RegisterWorkerRequest {
  string name = 1;
  string endpoint_url = 2;
}

message RegisterWorkerResponse {
  string worker_id = 1;
}

message HeartbeatRequest {
  string worker_id = 1;
  WorkerStatus status = 2;
  optional string current_sub_task_id = 3;
}

message HeartbeatResponse {}

message UnregisterWorkerRequest {
  string worker_id = 1;
}

message UnregisterWorkerResponse {}

message GetNextSubTaskRequest {
  string worker_id = 1;
}

message GetNextSubTaskResponse {
  optional SubTask sub_task = 1;
  optional UnitTask unit_task = 2;
}

message ReportSubTaskStatusRequest {
  string worker_id = 1;
  string sub_task_id = 2;
  SubTaskStatus status = 3;
  repeated GeneratedCommit generated_commits = 4;
  optional string error = 5;
}

message ReportSubTaskStatusResponse {}

message EmitSessionEventRequest {
  string worker_id = 1;
  SessionOutputEvent event = 2;
}

message EmitSessionEventResponse {}

service WorkerService {
  rpc Register(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Unregister(UnregisterWorkerRequest) returns (UnregisterWorkerResponse);
  rpc GetNextSubTask(GetNextSubTaskRequest) returns (GetNextSubTaskResponse);
  rpc ReportSubTaskStatus(ReportSubTaskStatusRequest) returns (ReportSubTaskStatusResponse);
  rpc EmitSessionEvent(EmitSessionEventRequest) returns (EmitSessionEventResponse);
}

// ============================================================================
// SecretsService
// ============================================================================

message Secret {
  string key = 1;
  string value = 2;
}

message SendSecretsRequest {
  string sub_task_id = 1;
  repeated Secret secrets = 2;
}

message SendSecretsResponse {}

message ClearSecretsRequest {
  string sub_task_id = 1;
}

message ClearSecretsResponse {}

service SecretsService {
  rpc Send(SendSecretsRequest) returns (SendSecretsResponse);
  rpc Clear(ClearSecretsRequest) returns (ClearSecretsResponse);
}
